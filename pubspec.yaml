name: proper_notes
description: Local-first note-taking app for Linux and Android.
publish_to: "none"
version: 0.1.0-rc1+1

environment:
  sdk: ^3.3.0

dependencies:
  crypto: ^3.0.3
  drift: ^2.17.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  google_sign_in: ^7.2.0
  http: ^1.2.2
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  sqlite3_flutter_libs: ^0.5.24
  url_launcher: ^6.3.1
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.9
  drift_dev: ^2.17.0
  flutter_lints: ^3.0.2
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
